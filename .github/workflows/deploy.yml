name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  AWS_REGION: eu-central-1

permissions:
  contents: read
  id-token: write
  deployments: write

jobs:
  deploy:
    name: Build & Deploy to AWS
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: production
      url: https://reebal-sami.com
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install app dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js for deployment
        run: ./scripts/build-for-deploy.sh
        env:
          CHATBOT_API_KEY: ${{ secrets.CHATBOT_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        run: npm ci
        working-directory: infra

      - name: CDK Deploy (prod)
        run: npx cdk deploy --all --context stage=prod --context hostedZoneId=Z011195418EPNPJCP44NR --require-approval never
        working-directory: infra
        env:
          CHATBOT_API_KEY: ${{ secrets.CHATBOT_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
