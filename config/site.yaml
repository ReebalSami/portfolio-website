# =============================================================================
# Portfolio Website Configuration — Single Source of Truth
# =============================================================================
# All configurable values live here. Components read from this file via
# src/lib/config.ts (Zod-validated, TypeScript-typed).
# Secrets (API keys) go in .env.local, NOT here.
# =============================================================================

# --- Site Metadata ---
site:
  name: "Reebal Sami"
  title: "Data Scientist & AI Engineer"
  tagline: "Transforming data into intelligent solutions"
  description: "Personal portfolio of Reebal Sami — Data Scientist & AI Engineer based in Hamburg, Germany"
  url: "https://reebal-sami.com"
  repo: "https://github.com/ReebalSami/portfolio-website"

# --- Contact (public on website) ---
contact:
  email: "contact@reebal-sami.com"
  location: "Hamburg, Germany"

# --- Social Links ---
social:
  linkedin: "https://linkedin.com/in/reebal-sami"
  github: "https://github.com/ReebalSami"
  # twitter: ""
  # medium: ""

# --- Internationalization ---
i18n:
  defaultLocale: "en"
  locales:
    - "en"
    - "de"
    - "es"
    - "ar"
  rtlLocales:
    - "ar"
  localeNames:
    en: "English"
    de: "Deutsch"
    es: "Español"
    ar: "العربية"

# --- Feature Flags ---
features:
  blog: true
  chatbot: true
  contactForm: true
  darkMode: true
  analytics: true
  rss: true
  downloadCV: true
  cv: true

# --- Photos ---
# Three photo slots, each with its own file + directory so the homepage, CV web
# page, and CV PDFs can use different images without touching code.
#   - homepage → hero photo on `/` (and JSON-LD + shared-element morph source)
#   - cvPage   → hero photo on `/cv` (Editorial theme; also canonical morph target)
#   - cvPdf    → photo embedded in ATS + Visual PDFs via Typst. On each
#                `make cv:pdf` the configured file is copied to
#                `scripts/typst/assets/profile-photo.png` so Typst's hardcoded
#                template path keeps working. Typst content-sniffs so the
#                extension on disk is cosmetic.
photos:
  homepage:
    file: "start-photo.JPG"
    dir: "/images/homepage/hero"
  cvPage:
    file: "option-1.JPG"
    dir: "/images/resume"
  cvPdf:
    file: "start-photo.JPG"
    dir: "/images/cv"
  treatment: "bw-with-geometric-shapes"  # CSS filter + decorative shapes

# --- Design Tokens (override in tailwind.config.ts) ---
design:
  fonts:
    heading: "Space Grotesk"
    body: "DM Sans"
    mono: "JetBrains Mono"
    arabic: "IBM Plex Sans Arabic"
  borderRadius:
    small: "0.5rem"
    medium: "1rem"
    large: "1.5rem"
  maxWidth: "1280px"
  contentWidth: "768px"

# --- Analytics (when features.analytics is true) ---
analytics:
  provider: "plausible"
  siteId: "reebal-sami.com"
  scriptUrl: "https://plausible.io/js/pa-NzWnGaW6jjf3SGk87Xkpq.js"

# --- AI Chatbot ---
chatbot:
  provider: "openai"
  model: "gpt-4o-mini"
  apiKeyEnvVar: "CHATBOT_API_KEY"  # References .env.local variable
  maxTokens: 1000
  rateLimit:
    maxRequests: 10
    windowSeconds: 3600   # 10 requests per IP per hour

# --- Contact Form ---
contactForm:
  provider: "resend"      # "resend" for dev, "ses" for prod
  apiKeyEnvVar: "RESEND_API_KEY"
  recipientEmail: "reebal.sami@gmail.com"
  honeypotField: "website" # Hidden field name for spam detection

# --- SEO ---
seo:
  ogImage: ""   # Empty = uses dynamic OG image from opengraph-image.tsx (includes real hero photo)
  twitterCard: "summary_large_image"
  # twitterHandle: ""

# --- AWS / Deployment ---
aws:
  region: "eu-central-1"
  cdkStack: "portfolio-website-stack"
  stages:
    preview:
      subdomain: "preview"
    prod:
      customDomain: "reebal-sami.com"

# --- CV System ---
cv:
  variants:
    - id: "ats"
      name: "ATS-Friendly"
      pdfPath: "/cv/ats/resume_reebal_sami.pdf"
    - id: "visual"
      name: "Visual"
      pdfPath: "/cv/visual/resume_reebal_sami.pdf"
  defaultVariant: "public"       # "public" or "full" (data source)

# --- Build ---
build:
  outputDir: "out"

# --- Hero / Lamp Tuning (iter-4 v5) ---
# Four position knobs + size + wall/surface mode + animation timing + palette.
# Edit → save → refresh the browser. In dev the YAML is re-read every request
# so changes apply instantly. Remove the whole `hero` block to use defaults.
#
# Text and lamp are ALWAYS horizontally grid-centered in the right column
# (same position the text had before the lamp existed). The x/y knobs are
# CSS `translate(x, y)` offsets from that centered base:
#   x > 0 → right,  x < 0 → left     (physical axis; not RTL-flipped)
#   y > 0 → down,   y < 0 → up
# Any CSS length works: "0", "2rem", "-1rem", "5%", "12px", etc.
hero:
  textBlock:
    x: "-10%"
    y: "15%"
  # Mobile-only text-block translate. Defaults to (0, 0) so the name heading
  # does not slide off the left edge at 375 px viewport. Tune independently.
  textBlockMobile:
    x: "0"
    y: "0"
  photoRelight:
    # Master switch for photo relight overlays.
    enabled: true
    # Intensity presets:
    #   subtle      -> very light localized warm response
    #   balanced    -> natural but clearly visible (default)
    #   pronounced  -> stylized stronger highlight
    profile: "pronounced"
    # Base tone handling in lit area:
    #   keep-grayscale      -> keep fully monochrome base
    #   slight-color-return -> restore a small amount of native color where lit
    baseTone: "slight-color-return"
  lamp:
    # Base anchor point inside the hero text column. The lamp's own center-top
    # point is attached here, then lamp.x/lamp.y are applied as deltas.
    # Any CSS length works: "50%", "0", "12rem", "calc(50% - 2rem)", etc.
    anchor:
      x: "35%"
      y: "-90%"
    x: "0"
    y: "0"
    # Size of the lamp bounding box.
    width: "60rem"
    height: "40rem"
    # "drop" — no wall, no horizon line. Clean bulb + beams only.
    # "keep" — original Aceternity wall + horizon line.
    wallMode: "keep"
    # "background"  — beam edges fade into page bg; seamless across the
    #                 hero/about boundary.
    # "transparent" — raw rectangular beam edges (debug only).
    surfaceMode: "background"
    animation:
      # "replay" = reveal animation each mount/refresh.
      # "static" = render end-state immediately (best for position tuning).
      mode: "replay"
      # Seconds. Larger = slower reveal. Animations ALWAYS play on every
      # page refresh (sitewide — not just the lamp).
      durationSec: 1.6
      delaySec: 0.3
    palette:
      # Low-chroma warm honey in light mode (per Linear / Stripe / Apple
      # Intelligence light-UI practice). Any valid CSS colour works;
      # oklch() recommended for easy L / C / H tuning.
      light:
        beam: "oklch(0.85 0.09 70)"   # soft honey
        glow: "oklch(0.88 0.07 70)"   # peachy haze
        core: "oklch(0.92 0.08 65)"   # near-white warm core
      dark:
        beam: "oklch(0.78 0.14 55)"
        glow: "oklch(0.82 0.12 55)"
        core: "oklch(0.90 0.10 55)"
