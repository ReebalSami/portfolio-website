# --- Profile / Summary ---
profile:
  summary:
    en: >-
      Data Scientist & AI Engineer bridging business strategy and cutting-edge AI.
      Five years at Otto Group built deep expertise in corporate data flows, financial systems, and cross-functional stakeholder communication.
      Now orchestrating end-to-end AI solutions across multiple layers — from multi-agent LLM systems and automated news-crawler pipelines
      to deep learning models for computer vision, deployed on modern cloud infrastructure (AWS CDK).
      Delivered a B2B sales lead pipeline that reduced manual research workload by 53%.
      Equally comfortable with AI-assisted rapid prototyping using the latest tools and navigating legacy enterprise systems.
      Pursuing an M.Sc. in Data Science & AI at FH Wedel while actively shipping production code.
    de: >-
      Data Scientist & KI-Ingenieur an der Schnittstelle von Geschäftsstrategie und modernster KI.
      Fünf Jahre bei der Otto Group haben tiefes Know-how in Unternehmensdatenflüssen, Finanzsystemen und bereichsübergreifender Stakeholder-Kommunikation aufgebaut.
      Heute werden End-to-End-KI-Lösungen über mehrere Schichten orchestriert — von Multi-Agenten-LLM-Systemen und automatisierten News-Crawler-Pipelines
      bis hin zu Deep-Learning-Modellen für Computer Vision, deployed auf moderner Cloud-Infrastruktur (AWS CDK).
      B2B-Sales-Lead-Pipeline geliefert, die den manuellen Rechercheaufwand um 53 % reduziert hat.
      Gleichermaßen versiert im KI-gestützten Rapid Prototyping mit neuesten Tools und in der Navigation durch Legacy-Enterprise-Systeme.
      Parallel dazu M.Sc. in Data Science & AI an der FH Wedel mit Fokus auf produktionsreifen Code.
    es: "[TODO]"
    ar: "[TODO]"

