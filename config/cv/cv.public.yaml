      de: "Multi-Agenten-LLM-System für B2B-Vertriebsrecherche. Vier Agenten (Targeting, Insights, Kontaktsuche, Outreach) teilen Zustand über ein PostgreSQL-3NF-Schema; asynchrone Parallelisierung senkt die Latenz um ~10×. Manueller Recherche-Aufwand um 53 % reduziert."
      es: "Sistema LLM multiagente que automatiza la investigación de ventas B2B. Cuatro agentes (Targeting, Insights, Contact Discovery, Outreach) comparten el estado a través de un esquema PostgreSQL 3NF; Latencia de corte de distribución asíncrona ~10×. Reducción de la carga de trabajo de investigación manual en un 53%."
      ar: "نظام LLM متعدد الوكلاء لأتمتة أبحاث مبيعات B2B. أربعة وكلاء (الاستهداف، والرؤى، واكتشاف جهات الاتصال، والتواصل) يتشاركون الحالة عبر مخطط PostgreSQL 3NF؛ زمن وصول قطع المروحة غير المتزامن ~ 10 ×. تقليل عبء العمل البحثي اليدوي بنسبة 53%."
    tags: ["Python", "Agno", "OpenAI", "PostgreSQL", "Vector Search", "Streamlit"]

  - name: "Urban Farming Plant Health"
    date: "2025"
    context:
      en: "M.Sc. Deep Learning · FH Wedel"
      de: "M.Sc. Deep Learning · FH Wedel"
      es: "Maestría en Ciencias Aprendizaje profundo · FH Wedel"
      ar: "ماجستير التعلم العميق · FH Wedel"
    description:
      en: "Hierarchical 3-stage pipeline (PlantID → Health → Disease) across 8+ ViT/CNN architectures on 31k+ images — 99.9 / 99.7 / 99.1 % per stage. Key finding: significant train-deploy domain gap on whole-plant scenes. Grad-CAM + Attention Rollout dashboard."
      de: "Hierarchische 3-stufige Pipeline (PlantID → Gesundheit → Krankheit), 8+ ViT/CNN-Architekturen, 31k+ Bilder — 99,9 / 99,7 / 99,1 % je Stufe. Kernerkenntnis: deutlicher Train-Deploy-Domain-Gap auf ganzen Pflanzen. Grad-CAM + Attention Rollout Dashboard."
      es: "Canalización jerárquica de 3 etapas (PlantID → Salud → Enfermedad) en más de 8 arquitecturas ViT/CNN en más de 31.000 imágenes: 99,9/99,7/99,1 % por etapa. Hallazgo clave: brecha significativa en el dominio de implementación de trenes en escenas de toda la planta. Panel de implementación de Grad-CAM + Atención."
      ar: "خط أنابيب هرمي ثلاثي المراحل (PlantID → Health → Disease) عبر أكثر من 8 بنيات ViT/CNN على أكثر من 31 ألف صورة - 99.9 / 99.7 / 99.1٪ لكل مرحلة. النتيجة الرئيسية: وجود فجوة كبيرة في مجال التدريب والنشر في مشاهد المصنع بالكامل. Grad-CAM + لوحة معلومات بدء الانتباه."
    tags: ["PyTorch", "timm", "ViT", "DINOv2", "Grad-CAM", "Streamlit"]

