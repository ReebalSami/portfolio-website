# --- Profile / Summary ---
profile:
  summary:
    en: >-
      Data Scientist and AI Engineer working at the intersection of business and modern AI.
      Over five years at OTTO Group built deep fluency in corporate data flows, financial systems, and cross-functional stakeholder work.
      Today I orchestrate end-to-end AI solutions across multiple layers — from multi-agent LLM systems and automated news-crawler pipelines
      to deep-learning models for computer vision.
      I built and deploy this portfolio on AWS CDK.
      Comfortable navigating modern AI-assisted development with the latest tools and the legacy enterprise systems many companies still run on.
      Currently writing my Master's thesis on GraphRAG Document Intelligence as part of my M.Sc. Data Science & AI at FH Wedel, while shipping production code on the side.
    de: >-
      Data Scientist und KI-Ingenieur an der Schnittstelle von Business und moderner KI.
      Über fünf Jahre bei der OTTO Group haben tiefes Verständnis für Unternehmensdatenflüsse, Finanzsysteme und bereichsübergreifende Stakeholder-Arbeit aufgebaut.
      Heute orchestriere ich End-to-End-KI-Lösungen über mehrere Schichten — von Multi-Agenten-LLM-Systemen und automatisierten News-Crawler-Pipelines
      bis hin zu Deep-Learning-Modellen für Computer Vision.
      Diese Portfolio-Website habe ich selbst gebaut und deploye sie via AWS CDK.
      Gleichermaßen zuhause in moderner KI-gestützter Entwicklung mit den neuesten Tools und in den Legacy-Enterprise-Systemen, auf denen viele Unternehmen immer noch laufen.
      Aktuell am Schreiben der Masterarbeit in Data Science & KI an der FH Wedel zum Thema GraphRAG Document Intelligence, parallel dazu produktionsreifer Code.
    es: >-
      Científico de datos e ingeniero de IA que trabaja en la intersección entre negocio e IA moderna.
      Más de cinco años en OTTO Group me dieron una comprensión profunda de flujos de datos corporativos, sistemas financieros y trabajo transversal con stakeholders.
      Hoy orquesto soluciones de IA de extremo a extremo en múltiples capas: desde sistemas LLM multiagente y pipelines automatizados de rastreo de noticias
      hasta modelos de deep learning para visión por computador.
      Construí y despliego este portfolio con AWS CDK.
      Me muevo con soltura tanto en desarrollo moderno asistido por IA con las últimas herramientas como en sistemas legacy empresariales que muchas compañías aún utilizan.
      Actualmente escribo mi tesis de máster sobre GraphRAG Document Intelligence como parte del M.Sc. Data Science & AI en FH Wedel, mientras sigo entregando código en producción.
    ar: >-
      عالم بيانات ومهندس ذكاء اصطناعي يعمل عند تقاطع الأعمال والذكاء الاصطناعي الحديث.
      على مدار أكثر من خمس سنوات في OTTO Group اكتسبت فهماً عميقاً لتدفقات بيانات الشركات والأنظمة المالية والعمل متعدد التخصصات مع أصحاب المصلحة.
      اليوم أقود حلول ذكاء اصطناعي شاملة عبر عدة طبقات: من أنظمة LLM متعددة الوكلاء وخطوط زحف الأخبار المؤتمتة
      إلى نماذج التعلم العميق لرؤية الحاسوب.
      قمت ببناء هذا الموقع ونشره باستخدام AWS CDK.
      أتنقل بثقة بين التطوير الحديث المدعوم بالذكاء الاصطناعي باستخدام أحدث الأدوات وبين أنظمة المؤسسات القديمة التي لا تزال كثير من الشركات تعتمد عليها.
      أكتب حالياً رسالة الماجستير حول GraphRAG Document Intelligence ضمن برنامج M.Sc. Data Science & AI في FH Wedel، بالتوازي مع تسليم كود إنتاجي.

